name: Sync docs to Wiki

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'plantillas/**'
      - 'plan-proyecto.md'
      - 'README.md'
  workflow_dispatch:

jobs:
  sync-wiki:
    name: Sincronizar con la Wiki
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Clonar la Wiki
        run: |
          git clone "https://x-access-token:${{ secrets.WIKI_TOKEN }}@github.com/${{ github.repository }}.wiki.git" wiki

      - name: Copiar archivos a la Wiki
        run: |
          cp README.md                                              wiki/Home.md
          cp plan-proyecto.md                                       wiki/PlandeProyecto.md
          cp docs/00-caso-y-equipo/caso-estudio.md                  wiki/00CasodeEstudio.md
          cp docs/00-caso-y-equipo/equipo.md                        wiki/00Equipo.md
          cp docs/01-plan-inicial/organizacion.md                   wiki/01Organizacion.md
          cp docs/01-plan-inicial/ciclo-de-vida.md                  wiki/01CiclodeVida.md
          cp docs/01-plan-inicial/entregables.md                    wiki/01Entregables.md
          cp docs/02-wbs-estimaciones/wbs.md                        wiki/02WBS.md
          cp docs/02-wbs-estimaciones/cronograma.md                 wiki/02Cronograma.md
          cp docs/02-wbs-estimaciones/red-de-tareas.md              wiki/02ReddeTareas.md
          cp docs/02-wbs-estimaciones/delphi.md                     wiki/02Delphi.md
          cp docs/03-recursos-raci/matriz-raci.md                   wiki/03MatrizRACI.md
          cp docs/03-recursos-raci/asignacion-recursos.md           wiki/03AsignacionRecursos.md
          cp docs/04-riesgos/registro-riesgos.md                    wiki/04RegistroRiesgos.md
          cp docs/04-riesgos/matriz-exposicion.md                   wiki/04MatrizExposicion.md
          cp docs/04-riesgos/plan-respuesta.md                      wiki/04PlanRespuesta.md
          cp docs/05-comunicaciones-cambios/plan-comunicaciones.md  wiki/05PlanComunicaciones.md
          cp docs/05-comunicaciones-cambios/gestion-cambios.md      wiki/05GestionCambios.md
          cp docs/06-pechakucha/guion.md                            wiki/06GuionPechaKucha.md
          cp plantillas/formulario-cambio.md                        wiki/PlantillaFormularioCambio.md
          cp plantillas/acta-reunion.md                             wiki/PlantillaActaReunion.md
          cp docs/_Sidebar.md                                       wiki/_Sidebar.md

      - name: Commit y push a la Wiki
        run: |
          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "sync: docs actualizados desde main"
          git push
